services:
  - type: web
    name: facture-flow-prospection
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: FIBERY_TOKEN
        sync: false
      - key: FIBERY_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
